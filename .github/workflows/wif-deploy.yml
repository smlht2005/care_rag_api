name: wif-deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify-wif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/441535054378/locations/global/workloadIdentityPools/github-actions-pool/providers/github-oidc
          service_account: ci-wif@gen-lang-client-0567547134.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify identity
        run: |
          gcloud auth list
          gcloud config list account

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install google-auth requests

      - name: Verify double-SA token flow by Python
        env:
          INVOKER_SA: 441535054378-compute@developer.gserviceaccount.com
          CLOUD_RUN_URL: https://care-rag-api-441535054378.asia-east1.run.app/invalid-audience-for-negative-test
          QUERY_URL: https://care-rag-api-441535054378.asia-east1.run.app/api/v1/query
          X_API_KEY: test-api-key
          EXPECT_NEGATIVE_TEST: "true"
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import google.auth
          import requests
          from google.auth import impersonated_credentials
          from google.auth.transport.requests import Request

          source_creds, _ = google.auth.default()
          target_creds = impersonated_credentials.Credentials(
              source_credentials=source_creds,
              target_principal=os.environ["INVOKER_SA"],
              target_scopes=["https://www.googleapis.com/auth/cloud-platform"],
              lifetime=3600,
          )
          id_creds = impersonated_credentials.IDTokenCredentials(
              target_credentials=target_creds,
              target_audience=os.environ["CLOUD_RUN_URL"],
              include_email=True,
          )
          id_creds.refresh(Request())
          token = id_creds.token
          print(f"token_prefix={token[:20]}..., token_len={len(token)}")

          # Decode JWT payload (without signature verification) for audience assertion.
          payload_b64 = token.split(".")[1]
          payload_b64 += "=" * (-len(payload_b64) % 4)
          payload = json.loads(base64.urlsafe_b64decode(payload_b64.encode("utf-8")).decode("utf-8"))
          token_aud = payload.get("aud")
          print("token_audience=", token_aud)

          expected_aud = os.environ["CLOUD_RUN_URL"]
          if token_aud != expected_aud:
              raise SystemExit(f"[FAIL] token aud mismatch, expected {expected_aud}, got {token_aud}")

          payload = {
              "query": "門診批價作業中，如何查詢某病患當日掛號紀錄？",
              "top_k": 3,
              "skip_cache": True,
          }
          headers = {"Authorization": f"Bearer {token}", "X-API-Key": os.environ["X_API_KEY"]}
          r = requests.post(os.environ["QUERY_URL"], headers=headers, json=payload, timeout=30)
          print("query_status=", r.status_code)
          print("query_body=", r.text[:300])

          if os.environ.get("EXPECT_NEGATIVE_TEST", "false").lower() == "true":
              auth_header = r.headers.get("www-authenticate", "")
              if r.status_code == 200:
                  raise SystemExit("[FAIL] negative test expected non-200 on /api/v1/query, got 200")
              if r.status_code == 401 and "invalid_token" in auth_header.lower():
                  print("[PASS] negative test confirmed: 401 invalid_token on /api/v1/query")
              else:
                  print("[WARN] non-200 observed but invalid_token header not found; verify Cloud Run auth mode")
          else:
              r.raise_for_status()
          PY
      

      