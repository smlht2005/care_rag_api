apiVersion: v1
kind: Namespace
metadata:
  name: hospital
---
apiVersion: v1
kind: Secret
metadata:
  name: nextjs-rbac-secrets
  namespace: hospital
type: Opaque
stringData:
  keycloak-client-secret: "<REPLACE>"
  session-secret: "<REPLACE-32-CHARS-MIN>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-rbac
  namespace: hospital
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-rbac
  template:
    metadata:
      labels:
        app: nextjs-rbac
    spec:
      containers:
        - name: nextjs
          image: hospital/nextjs-rbac:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: KEYCLOAK_URL
              value: "https://keycloak.hospital.internal"
            - name: KEYCLOAK_REALM
              value: "hospital"
            - name: KEYCLOAK_CLIENT_ID
              value: "nextjs-bff"
            - name: NEXTJS_URL
              value: "https://his.hospital.internal"
            - name: PATIENT_SERVICE_URL
              value: "http://patient-service.hospital.svc.cluster.local:8081"
            - name: ADMIN_SERVICE_URL
              value: "http://admin-service.hospital.svc.cluster.local:8082"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nextjs-rbac-secrets
                  key: keycloak-client-secret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: nextjs-rbac-secrets
                  key: session-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-rbac
  namespace: hospital
spec:
  selector:
    app: nextjs-rbac
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextjs-rbac
  namespace: hospital
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - his.hospital.internal
      secretName: hospital-tls
  rules:
    - host: his.hospital.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextjs-rbac
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nextjs-rbac-hpa
  namespace: hospital
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nextjs-rbac
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nextjs-rbac-pdb
  namespace: hospital
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nextjs-rbac
